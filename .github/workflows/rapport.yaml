  name: Compile rapport

  on: [push, pull_request]

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Run Makefile
          uses: xu-cheng/texlive-action@v3
          with:            
            run: 
              |
              make -C report
              make -C report2

        - name: Upload Report 1 (Structure)
          uses: actions/upload-artifact@v4
          with:
            name: report1_structure
            path: report/main.pdf

        - name: Upload Report 2 (Implementation)
          uses: actions/upload-artifact@v4
          with:
            name: report2_implementation
            path: report2/main.pdf